<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ClassGrab</title>
  <link rel="stylesheet" href="../styles/styles.css" />
</head>

<body id="body" class="dm">
  <div class="app-container">
    <header class="header">
      <div class="logo-container">
        <img src="../icons/48.png" alt="ClassGrab logo" class="logo-icon" />
        <div class="brand-text">
          <span class="brand-title">ClassGrab</span>
          <span class="version-badge">v1.1.2</span>
        </div>
      </div>

      <div class="header-actions">
        <button id="darkModeButton" class="icon-btn" aria-label="Toggle dark/light mode"
          data-i18n-aria-label="toggleTheme">
          <!-- Icon will be set dynamically via JS -->
        </button>
        <a href="https://github.com/ChthonicCream/classgrab" target="_blank" rel="noopener noreferrer"
          class="icon-btn github-link" aria-label="View source code on GitHub"
          data-i18n-aria-label="viewSource">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" class="svg-icon"><path d="M15 22v-4a4.8 4.8 0 0 0-1-3.5c3 0 6-2 6-5.5.08-1.25-.27-2.48-1-3.5.28-1.15.28-2.35 0-3.5 0 0-1 0-3 1.5-2.64-.5-5.36-.5-8 0C6 2 5 2 5 2c-.3 1.15-.3 2.35 0 3.5A5.403 5.403 0 0 0 4 9c0 3.5 3 5.5 6 5.5-.39.49-.68 1.05-.85 1.65-.17.6-.22 1.23-.15 1.85v4"/><path d="M9 18c-4.51 2-5-2-7-2"/></svg>
        </a>
      </div>
    </header>

    <main class="main-content">
      <div class="section-header">
        <h3 class="section-title" data-i18n="availableFiles">Available Files</h3>
        <label class="select-all-container">
          <input type="checkbox" id="selectAll" />
          <span class="select-all-checkmark"></span>
          <span class="select-all-label" data-i18n="selectAll">Select All</span>
        </label>
      </div>

      <div id="statusPanel" class="status-panel" role="status" aria-live="polite" hidden></div>

      <div class="list-container">
        <ul id="fileList" class="file-list" aria-label="List of downloadable files"
          data-i18n-aria-label="fileListLabel"></ul>
      </div>

      <div class="button-group">
        <button id="downloadSelected" class="primary-btn accent-btn">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="btn-icon"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          <span class="btn-label" data-i18n="downloadSelected">Download Selected</span>
        </button>
        <button id="downloadAll" class="primary-btn success-btn">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="btn-icon"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          <span class="btn-label" data-i18n="downloadAll">Download All</span>
        </button>
      </div>
    </main>
  </div>
  <script src="../scripts/popup.js"></script>
</body>

</html>
